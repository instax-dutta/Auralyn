logging:
  level:
    lavalink: WARN
    org.springframework: WARN
    com.github.topi314.lavasrc.spotify: 'OFF'

server:
  address: "127.0.0.1"
  port: 2333

lavalink:
  server:
    password: "${LAVALINK_PASSWORD}"
    sources:
      youtube: false
      soundcloud: true
      twitch: true
      bandcamp: true
      http: true
      local: true
    plugins:
      - lapix: true
    # Quality vs resilience tuning. Discord forwards our exact Opus stream to every
    # listener; the bot can only control what it sends out, not per-listener network.
    # So: encode at max quality, buffer generously to absorb source-side YouTube
    # jitter, and minimise GC pauses that would cause audible dropouts.
    bufferDurationMs: 500              # source-side jitter buffer (default 400)
    frameBufferDurationMs: 10000       # player-side Opus frame buffer (default 5000)
    opusEncodingQuality: 10            # 0-10, max quality
    resamplingQuality: HIGH            # LOW / MEDIUM / HIGH — best fidelity
    useSeekGhosting: true              # smoother user-initiated seeks
    trackStuckThresholdMs: 10000       # give slow sources 10s before declaring stuck
    nonAllocatingFrameBuffer: true     # zero-alloc ring buffer → fewer GC pauses
    gcWarnings: false
    playlistFetchLimit: 10
    playlistSearchLimit: 10
    playlistSearchRelevanceFilterLimit: 100

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.2"

  tracking:
    client: lavalink4j
    interval: 10

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Ordered client list. The plugin tries each in turn; first to succeed wins.
    # MUSIC (YT Music) uses different auth and is the most reliable for music.
    # TVHTML5EMBEDDED is anonymous and historically the last to break.
    # WEB / WEBEMBEDDED / MWEB are kept as fallbacks.
    # ANDROID_VR is kept last because YouTube has been actively breaking it.
    clients:
      - MUSIC
      - TVHTML5EMBEDDED
      - WEBEMBEDDED
      - WEB
      - MWEB
      - ANDROID_VR

  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      vkmusic: false
      tidal: false
      qobuz: false
      ytdlp: false
      jiosaavn: false
      flowerytts: false
      youtube: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      spDc: "${SPOTIFY_SP_DC:}"
      countryCode: "US"
      playlistLoadLimit: 100
      albumLoadLimit: 100
