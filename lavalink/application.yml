logging:
  level:
    lavalink: WARN
    org.springframework: WARN

server:
  address: "127.0.0.1"
  port: 2333

lavalink:
  server:
    password: "${LAVALINK_PASSWORD}"
    sources:
      youtube: false
      soundcloud: true
      twitch: true
      bandcamp: true
      http: true
      local: true
    plugins:
      - lapix: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    gcWarnings: false
    playlistFetchLimit: 10
    playlistSearchLimit: 10
    playlistSearchRelevanceFilterLimit: 100

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.2"

  tracking:
    client: lavalink4j
    interval: 10

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      vkmusic: false
      tidal: false
      qobuz: false
      ytdlp: false
      jiosaavn: false
      flowerytts: false
      youtube: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "US"
      playlistLoadLimit: 0
      albumLoadLimit: 0
