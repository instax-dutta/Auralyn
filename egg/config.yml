name: Auralyn Discord Music Bot
description: Single-image Discord music bot with bundled Lavalink
author: admin@example.com
image: ghcr.io/instax-dutta/auralyn:latest
startup: /app/scripts/start.sh
done: Auralyn is running.
requirements:
  memory_mb: 2048
  disk_mb: 1024
  ports:
    - 2333
environment:
  NODE_ENV: production
  DISCORD_TOKEN: ""
  CLIENT_ID: ""
  GUILD_ID: ""
  LAVALINK_HOST: 127.0.0.1
  LAVALINK_PORT: "2333"
  LAVALINK_PASSWORD: ""
  LAVALINK_SECURE: "false"
  LAVALINK_MEMORY: 1G
  LAVALINK_STARTUP_TIMEOUT: "90"
  SPOTIFY_CLIENT_ID: ""
  SPOTIFY_CLIENT_SECRET: ""
  YOUTUBE_PO_TOKEN: ""
  YOUTUBE_VISITOR_DATA: ""
security:
  required_private_variables:
    - DISCORD_TOKEN
    - LAVALINK_PASSWORD
    - SPOTIFY_CLIENT_SECRET
  notes:
    - Set LAVALINK_PASSWORD to a long random value; no default password is provided.
    - Do not expose port 2333 publicly unless you intentionally want external Lavalink access.
